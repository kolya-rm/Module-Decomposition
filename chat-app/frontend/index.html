<!DOCTYPE html>
<html>
  <head lang="en">
    <title>Chat app</title>
    <meta name="Chat app" content="Simple chat application exercise">
    <meta charset="UTF-8">
    <script src="script.mjs"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="chat-container">
      <div id="chat">
        
      </div>
      <div id="message-panel">
        <div id="username-container">
          <label id="username-lable" for="username">Username:</label>
          <input id="username" type="text">
        </div>
        <div id="message-container">
          <label id="message-lable" for="message">Message:</label>
          <textarea id="message"></textarea>
        </div>
        <div id="button-container">
          <button id="btn-send" type="button">Send</button>
        </div>
      </div>
    </div>
  </body>
</html>
