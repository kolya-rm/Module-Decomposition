<!DOCTYPE html>
<html>
  <head lang="en">
    <title>Quote server</title>
    <meta name="Random quotes" content="Random quote show page">
    <meta charset="UTF-8">
    <script src="script.mjs"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="container">
      <div id="get-quote-container">
        <div id="get-quote-text">
          <p>Quote text</p>
        </div>
        <div id="get-quote-author">
           <p>Author</p>
        </div>
        <div id="get-quote-button-container">
          <button id="btn-get-quote" type="button">Get quote</button>
        </div>  
      </div>
      <div id="add-quote-container">
          <form id="add-quote">
            <label id="label-add-quote-text" for="add-quote-text">Text:</label>
            <textarea id="add-quote-text" placeholder="Input quote text"></textarea>
            <label id="label-add-quote-author" for="add-quote-author">Author:</label>
            <input type="text" id="add-quote-author" placeholder="Input quote author"></textarea>
            <button id="btn-add-quote" type="button">Add quote</button>
          </form>
        </div>
    </div>
  </body>
</html>
