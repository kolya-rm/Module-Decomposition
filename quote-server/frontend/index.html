<!DOCTYPE html>
<html>
  <head lang="en">
    <title>Quote server</title>
    <meta name="Random quotes" content="Random quote show page">
    <meta charset="UTF-8">
    <script src="script.mjs"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="container">
      <div id="quote">
        <div id="text">
          <p>Quote text</p>
        </div>
        <div id="author">
           <p>Author</p>
        </div>
        <div id="button_container">
          <button id="btn_get_quote">Get quote</button>
        </div>  
      </div>
      <div id="add_quote_container">
          <form id="add_quote">
            <label id="label_add_quote_text" for="add_quote_text">Text:</label>
            <textarea id="add_quote_text" placeholder="Input quote text"></textarea>
            <label id="label_add_quote_author" for="add_quote_author">Author:</label>
            <input type="text" id="add_quote_author" placeholder="Input quote author"></textarea>
            <button id="btn_add_quote">Add quote</button>
          </form>
        </div>
    </div>
  </body>
</html>
